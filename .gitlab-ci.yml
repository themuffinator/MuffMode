stages:
  - build

.windows_build:
  tags:
    - windows
  before_script:
    - |
      $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
      $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
      if (-not $vsPath) { Write-Error "Visual Studio with C++ build tools not found"; exit 1 }
      $vcvarsall = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
      if (-not (Test-Path $vcvarsall)) { Write-Error "vcvarsall.bat not found"; exit 1 }
      $msbuild = Join-Path $vsPath "MSBuild\Current\Bin\MSBuild.exe"
      if (-not (Test-Path $msbuild)) { Write-Error "MSBuild not found"; exit 1 }
      Set-Item -Path Env:VCVARSALL -Value $vcvarsall
      Write-Host "MSBuild: $msbuild"
      Set-Item -Path Env:MSBUILD -Value $msbuild

build-release:
  extends: .windows_build
  stage: build
  script:
    - 'cmd /c "\"%VCVARSALL%\" x64 && \"%MSBUILD%\" src\\MuffMode.sln /p:Configuration=Release /p:Platform=x64"'
  artifacts:
    name: "muffmode-release-${CI_COMMIT_SHORT_SHA}"
    paths:
      - game_x64.dll
    expire_in: 1 week
