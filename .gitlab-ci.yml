stages:
  - build

.windows_build:
  tags:
    - windows
  before_script:
    - |
      $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
      $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
      if (-not $msbuild) { Write-Error "MSBuild not found"; exit 1 }
      Write-Host "MSBuild: $msbuild"
      Set-Item -Path Env:MSBUILD -Value $msbuild

build-release:
  extends: .windows_build
  stage: build
  script:
    - '& $env:MSBUILD src\MuffMode.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal'
  artifacts:
    name: "muffmode-release-${CI_COMMIT_SHORT_SHA}"
    paths:
      - game_x64.dll
    expire_in: 1 week

build-debug:
  extends: .windows_build
  stage: build
  script:
    - '& $env:MSBUILD src\MuffMode.sln /p:Configuration=Debug /p:Platform=x64 /m /v:minimal'
  artifacts:
    name: "muffmode-debug-${CI_COMMIT_SHORT_SHA}"
    paths:
      - game_x64.dll
    expire_in: 3 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
