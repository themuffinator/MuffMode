name: Build Windows DLL

on:
  push:
    branches: [main, master, ozdev]
  pull_request:
    branches: [main, master, ozdev]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukorito/vcpkg-actions/setup-vcpkg@v1
        with:
          vcpkgVersion: "2024.01.26"

      - name: Install vcpkg dependencies
        run: vcpkg install --triplet x64-windows-static
        working-directory: src

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild src\MuffMode.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload game_x64.dll
        uses: actions/upload-artifact@v4
        with:
          name: game_x64
          path: game_x64.dll
